<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
        }
      }
      </script>
    <script type="module" src="js/main-script.js"></script>
    <title>CG - Project26</title>
  </head>

  <body>
    <nav id="hud" class="hud-panel" aria-label="Scene controls">
      <section class="hud-group" aria-label="Models">
        <button class="hud-button" type="button" data-model-id="tesseract">Tesseract</button>
        <button class="hud-button" type="button" data-model-id="bunny">Bunny</button>
        <button class="hud-button" type="button" data-model-id="artemis">Artemis</button>
      </section>

      <section class="hud-group" aria-label="Rendering">
        <button id="toggle-directional-light" class="hud-button" type="button">Directional Light</button>
        <button id="toggle-point-lights" class="hud-button" type="button">Light Points</button>
        <button id="toggle-spotlights" class="hud-button" type="button">Spotlights</button>
        <button id="toggle-material" class="hud-button" type="button">Phong</button>
        <button id="toggle-anaglyph" class="hud-button" type="button">Anaglyph</button>
      </section>
    </nav>
  </body>
</html>
