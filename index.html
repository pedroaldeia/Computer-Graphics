<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/",
          "stats": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/libs/stats.module.js"
        }
      }
      </script>
    <script type="module" src="js/main-script.js"></script>
    <title>CG - Project26</title>
  </head>

  <body>
    <div id="hud">
      <div class="hud-section">
        <div class="key-item" id="key-1">1: Top View</div>
        <div class="key-item" id="key-2">2: Lateral View</div>
        <div class="key-item" id="key-3">3: Frontal View</div>
        <div class="key-item" id="key-4">4: Orthogonal</div>
        <div class="key-item" id="key-5">5: Perspective</div>
        <div class="key-item" id="key-6">6: Mobile Camera</div>
        <div class="key-item" id="key-7">7: Wireframe</div>
        <div class="key-item" id="key-h">H: Helpers</div>
      </div>
      <hr class="hud-divider"/>
      <div class="hud-section">
        <div class="key-item" id="key-q">Q: Fold/Unfold Arms</div>
        <div class="key-item" id="key-w">W: Ascend</div>
        <div class="key-item" id="key-s">S: Descend</div>
        <div class="key-item" id="key-a">A: Move Left</div>
        <div class="key-item" id="key-d">D: Move Right</div>
        <div class="key-item" id="key-u">U: Move Forward</div>
        <div class="key-item" id="key-j">J: Move Backward</div>
        <div class="key-item" id="key-i">I: Yaw Left</div>
        <div class="key-item" id="key-k">K: Yaw Right</div>
        <div class="key-item" id="key-o">O: Pitch Up</div>
        <div class="key-item" id="key-l">L: Pitch Down</div>
      </div>
    </div>

    <style>
      #hud {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 15px;
        border-radius: 8px;
        font-family: sans-serif;
        pointer-events: none;
        z-index: 100;
      }
      .active {
        background: #44ff44;
        color: black;
        font-weight: bold;
      }
      .hud-divider {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.3);
        margin: 8px 0;
      }
      .hud-section {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
    </style>
  </body>
</html>
